services:
  - type: web
    name: smarter-os-core
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smarter-os-core
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: smarter-os-core
    plan: free
    region: oregon
    postgresMajorVersion: "16"
